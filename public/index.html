<!DOCTYPE html>
<html>
<head>
  <title>Student Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
  <h2 class="text-center mb-4 text-white">Student Management System</h2>

  <div class="card p-4 shadow">
    <form id="studentForm">
      <input type="hidden" id="studentId">
      <input type="text" id="name" class="form-control mb-2" placeholder="Name" required>
      <input type="email" id="email" class="form-control mb-2" placeholder="Email" required>
      <input type="text" id="course" class="form-control mb-2" placeholder="Course" required>
      <input type="number" id="age" class="form-control mb-2" placeholder="Age" required>
      <button class="btn btn-primary w-100">Save Student</button>
    </form>
  </div>

  <table class="table table-striped mt-4 bg-white">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Course</th>
        <th>Age</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="studentTable"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
